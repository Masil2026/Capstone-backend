# =============================================
# DEV 프로파일 — 로컬 개발 전용
# 실행: --spring.profiles.active=dev
# =============================================

# SQL 로그 (개발 시 쿼리 확인용)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security 디버그 로그 (문제 파악 후 제거 가능)
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2.server.resource=TRACE

# Clerk Secret Key — DevAuthController(/dev/auth/token)에서만 사용
clerk.secret-key=${CLERK_SECRET_KEY}

# Actuator + Prometheus (부하테스트 모니터링) — dev 전용, prod 미노출
#   /actuator/prometheus 로 Micrometer 지표 노출 → Prometheus가 스크레이프
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.access=unrestricted
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
# http.server.requests 에 히스토그램 버킷 추가 → Grafana에서 p95/p99 계산 가능
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s
