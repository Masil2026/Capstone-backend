spring.application.name=capstone-backend

# 1. R2DBC 설정 (PostgreSQL — 앱 전용)
spring.r2dbc.url=${R2DBC_URL}
spring.r2dbc.username=${R2DBC_USERNAME}
spring.r2dbc.password=${R2DBC_PASSWORD}
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20

# 2. Flyway 설정 (JDBC 전용 — Flyway는 R2DBC 미지원)
spring.flyway.enabled=true
spring.flyway.url=${FLYWAY_URL}
spring.flyway.user=${FLYWAY_USERNAME}
spring.flyway.password=${FLYWAY_PASSWORD}

# 3. Redis (Docker) 설정
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.ssl.enabled=false

# 4. AI 에이전트 서버 주소 (FastAPI)
ai.agent.url=${AI_AGENT_URL}
ai.internal-token=${AI_INTERNAL_TOKEN}

# 5. Flyway 활성화
springdoc.api-docs.enabled=true

# Clerk 설정
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URL}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER}
clerk.api.secret-key=${CLERK_SECRET_KEY}
